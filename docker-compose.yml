version: '3'
services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hris-app
    container_name: hris-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=hris
      - DB_USERNAME=hris_user
      - DB_PASSWORD=hris_password
    depends_on:
      - db
    networks:
      - hris-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: hris-web
    restart: unless-stopped
    ports:
      - "8080:80" # Map to host port 8080. Point Nginx Proxy Manager to this port.
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - hris-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: hris-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hris
      MYSQL_USER: hris_user
      MYSQL_PASSWORD: hris_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - hris-db-data:/var/lib/mysql
    networks:
      - hris-network

networks:
  hris-network:
    driver: bridge

volumes:
  hris-db-data:
    driver: local
