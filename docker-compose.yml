services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hris-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: hris_db
      DB_USERNAME: hris_user
      DB_PASSWORD: hris_password
      APP_URL: http://localhost:8080
      APP_KEY: ${APP_KEY}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: hris-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hris_db
      MYSQL_USER: hris_user
      MYSQL_PASSWORD: hris_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db_data:
